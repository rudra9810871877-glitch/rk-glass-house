<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RK Glass House Aluminium Fabrication</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 3D Animated Background -->
  <canvas id="bg-canvas"></canvas>

  <!-- Hero Section -->
  <header>
    <h1>RK Glass House</h1>
    <p>Professional Glass & Aluminium Services in Faridabad | Serving Delhi NCR</p>
  </header>

  <!-- Services Section -->
  <section id="services">
    <h2>Our Services</h2>
    <div class="services-container">
      <div class="service">Window Glass</div>
      <div class="service">Mirror Fitting</div>
      <div class="service">Aluminium Work</div>
      <div class="service">Glass Cutting</div>
      <div class="service">Glass Grinding</div>
      <div class="service">Beveling</div>
      <div class="service">Glass Film</div>
      <div class="service">Designer Glass</div>
      <div class="service">Glass Partition</div>
    </div>
  </section>

  <!-- Gallery + Videos Section -->
  <section id="gallery">
    <h2>Gallery</h2>
    <div id="gallery-container"></div>
  </section>

  <!-- Location Section -->
  <section id="location">
    <h2>Our Location</h2>
    <iframe 
      src="https://www.google.com/maps?q=28.4331,77.3002&hl=es;z=17&output=embed" 
      width="100%" height="300" 
      style="border:0; border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,0.3);" 
      allowfullscreen="" loading="lazy">
    </iframe>
  </section>

  <!-- Lightbox Overlay -->
  <div id="lightbox-overlay">
    <span id="lightbox-close">&times;</span>
    <img id="lightbox-img" src="" alt="">
    <video id="lightbox-video" controls></video>
  </div>

  <script src="script.js"></script>
</body>
</html>
